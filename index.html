<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body>
<div class="container mt-5">
  <h1>RSS Reader</h1>
  <form id="rss-form" class="mt-4">
    <div class="mb-3">
      <label for="rss-url" class="form-label">RSS URL</label>
      <input type="text" class="form-control" id="rss-url" required>
    </div>
    <button type="submit" class="btn btn-primary">Add RSS</button>
  </form>
  <div id="rss-feed" class="mt-4"></div>
</div>
  </body>
</html>
